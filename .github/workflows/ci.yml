name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: flank
          POSTGRES_PASSWORD: flank
          POSTGRES_DB: flank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flank"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://flank:flank@localhost:5432/flank_test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Setup Node 24
        # Node 24 aligns the runtime with the bumped @types/node (Node-26 line) from the major-deps
        # migration, so the types no longer describe APIs ahead of the runtime.
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Check bootstrap status
        id: bootstrap
        run: |
          if [ -f package.json ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not found — docs-only scaffold, skipping install and build (stays green by design)."
          fi

      - name: Install dependencies
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run CI suite (lint + typecheck + coverage + build)
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: just ci

      - name: Run DB-backed integration tests (applies migrations, runs the FlankStore contract)
        if: steps.bootstrap.outputs.bootstrapped == 'true'
        run: just test-integration
