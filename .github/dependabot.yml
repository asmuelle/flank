version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      # Batch ONLY minor + patch updates. Major bumps are deliberately excluded from the groups so
      # each major arrives as its OWN PR — a major version is a migration to do on a branch (see PR #9:
      # TS 6 / Next 16 / Zod 4 / inngest 4), not something to land bundled and un-migrated on main.
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # Action bumps (often "major" in tag terms but low-risk) batch together; still gated by CI.
      github-actions:
        update-types:
          - 'minor'
          - 'patch'
          - 'major'
