<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Flank — the living competitor radar for B2B SaaS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E12"/>
      <stop offset="0.55" stop-color="#0C1117"/>
      <stop offset="1" stop-color="#070A0D"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="32%" r="60%">
      <stop offset="0" stop-color="#B6FF3A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#B6FF3A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B6FF3A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B6FF3A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- thin grid -->
  <g stroke="#1B2630" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- radar, right side -->
  <g transform="translate(910 315)">
    <circle r="220" fill="none" stroke="#1F2C36" stroke-width="1.5"/>
    <circle r="160" fill="none" stroke="#1F2C36" stroke-width="1.5"/>
    <circle r="100" fill="none" stroke="#1F2C36" stroke-width="1.5"/>
    <circle r="40"  fill="none" stroke="#243441" stroke-width="1.5"/>
    <line x1="-220" y1="0" x2="220" y2="0" stroke="#1F2C36" stroke-width="1.5"/>
    <line x1="0" y1="-220" x2="0" y2="220" stroke="#1F2C36" stroke-width="1.5"/>
    <line x1="-155" y1="-155" x2="155" y2="155" stroke="#16212A" stroke-width="1"/>
    <line x1="-155" y1="155" x2="155" y2="-155" stroke="#16212A" stroke-width="1"/>
    <!-- sweep -->
    <path d="M0 0 L220 0 A220 220 0 0 0 90 -200 Z" fill="url(#sweep)"/>
    <line x1="0" y1="0" x2="220" y2="0" stroke="#B6FF3A" stroke-width="2"/>
    <!-- blips -->
    <circle cx="86" cy="-58" r="6" fill="#B6FF3A"/>
    <circle cx="-120" cy="40" r="5" fill="#B6FF3A" opacity="0.75"/>
    <circle cx="40" cy="120" r="4.5" fill="#B6FF3A" opacity="0.6"/>
    <circle cx="-60" cy="-130" r="4" fill="#5EE6C4" opacity="0.8"/>
    <circle cx="150" cy="90" r="4" fill="#5EE6C4" opacity="0.55"/>
  </g>

  <!-- copy -->
  <g transform="translate(80 230)">
    <text x="0" y="0" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="26" letter-spacing="6" fill="#B6FF3A" font-weight="700">COMPETITIVE INTELLIGENCE</text>
    <text x="0" y="120" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="132" font-weight="700" fill="#EAF2EC" letter-spacing="-3">Flank</text>
    <text x="0" y="190" font-family="'Inter', 'Segoe UI', sans-serif" font-size="34" fill="#9FB0AB" font-weight="500">The living competitor radar for B2B SaaS.</text>
    <text x="0" y="234" font-family="'Inter', 'Segoe UI', sans-serif" font-size="26" fill="#6E817C">Always-on dossiers. Citation-pinned deltas. Coming soon.</text>
  </g>

  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1B2630" stroke-width="2"/>
</svg>
